basePath: /api
definitions:
  handler.aiSettingsRequest:
    properties:
      apiKey:
        type: string
      autoSummary:
        type: boolean
      autoTranslate:
        type: boolean
      baseUrl:
        type: string
      model:
        type: string
      provider:
        type: string
      rateLimit:
        type: integer
      reasoningEffort:
        type: string
      summaryLanguage:
        type: string
      thinking:
        type: boolean
      thinkingBudget:
        type: integer
      thinkingSupported:
        type: boolean
    type: object
  handler.aiSettingsResponse:
    properties:
      apiKey:
        type: string
      autoSummary:
        type: boolean
      autoTranslate:
        type: boolean
      baseUrl:
        type: string
      model:
        type: string
      provider:
        type: string
      rateLimit:
        type: integer
      reasoningEffort:
        type: string
      summaryLanguage:
        type: string
      thinking:
        type: boolean
      thinkingBudget:
        type: integer
      thinkingSupported:
        type: boolean
    type: object
  handler.aiTestRequest:
    properties:
      apiKey:
        type: string
      baseUrl:
        type: string
      model:
        type: string
      provider:
        type: string
      reasoningEffort:
        type: string
      thinking:
        type: boolean
      thinkingBudget:
        type: integer
      thinkingSupported:
        type: boolean
    type: object
  handler.aiTestResponse:
    properties:
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  handler.appearanceSettingsRequest:
    properties:
      contentTypes:
        items:
          type: string
        type: array
    type: object
  handler.appearanceSettingsResponse:
    properties:
      contentTypes:
        items:
          type: string
        type: array
    type: object
  handler.authResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/handler.userResponse'
    type: object
  handler.authStatusResponse:
    properties:
      exists:
        type: boolean
    type: object
  handler.batchTranslateRequest:
    properties:
      articles:
        items:
          properties:
            id:
              type: string
            summary:
              type: string
            title:
              type: string
          type: object
        type: array
    type: object
  handler.clearCacheResponse:
    properties:
      listTranslations:
        type: integer
      summaries:
        type: integer
      translations:
        type: integer
    type: object
  handler.createFeedRequest:
    properties:
      folderId:
        type: string
      title:
        type: string
      type:
        type: string
      url:
        type: string
    type: object
  handler.deleteFeedsRequest:
    properties:
      ids:
        items:
          type: string
        type: array
    type: object
  handler.deleteFoldersRequest:
    properties:
      ids:
        items:
          type: string
        type: array
    type: object
  handler.deletedCountResponse:
    properties:
      deleted:
        type: integer
    type: object
  handler.domainRateLimitListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.domainRateLimitResponse'
        type: array
    type: object
  handler.domainRateLimitRequest:
    properties:
      host:
        type: string
      intervalSeconds:
        type: integer
    type: object
  handler.domainRateLimitResponse:
    properties:
      host:
        type: string
      id:
        type: string
      intervalSeconds:
        type: integer
    type: object
  handler.entryClearResponse:
    properties:
      deleted:
        type: integer
    type: object
  handler.entryListResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/handler.entryResponse'
        type: array
      hasMore:
        type: boolean
    type: object
  handler.entryResponse:
    properties:
      author:
        type: string
      content:
        type: string
      createdAt:
        type: string
      feedId:
        type: string
      id:
        type: string
      publishedAt:
        type: string
      read:
        type: boolean
      readableContent:
        type: string
      starred:
        type: boolean
      thumbnailUrl:
        type: string
      title:
        type: string
      updatedAt:
        type: string
      url:
        type: string
    type: object
  handler.errorResponse:
    properties:
      error:
        type: string
    type: object
  handler.feedConflictResponse:
    properties:
      error:
        example: feed_exists
        type: string
      existingFeed:
        $ref: '#/definitions/handler.feedResponse'
    type: object
  handler.feedPreviewResponse:
    properties:
      description:
        type: string
      imageUrl:
        type: string
      itemCount:
        type: integer
      lastUpdated:
        type: string
      siteUrl:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  handler.feedResponse:
    properties:
      createdAt:
        type: string
      description:
        type: string
      errorMessage:
        type: string
      etag:
        type: string
      folderId:
        type: string
      iconPath:
        type: string
      id:
        type: string
      lastModified:
        type: string
      siteUrl:
        type: string
      summaryPromptReminder:
        type: string
      title:
        type: string
      type:
        type: string
      updatedAt:
        type: string
      url:
        type: string
    type: object
  handler.folderRequest:
    properties:
      name:
        type: string
      parentId:
        type: string
      type:
        type: string
    type: object
  handler.folderResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      parentId:
        type: string
      type:
        type: string
      updatedAt:
        type: string
    type: object
  handler.generalSettingsRequest:
    properties:
      autoReadability:
        type: boolean
      fallbackUserAgent:
        type: string
    type: object
  handler.generalSettingsResponse:
    properties:
      autoReadability:
        type: boolean
      fallbackUserAgent:
        type: string
    type: object
  handler.iconClearResponse:
    properties:
      deleted:
        type: integer
    type: object
  handler.importCancelledResponse:
    properties:
      cancelled:
        type: boolean
    type: object
  handler.importStartedResponse:
    properties:
      status:
        type: string
    type: object
  handler.loginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  handler.markAllReadRequest:
    properties:
      contentType:
        type: string
      feedId:
        type: string
      folderId:
        type: string
    type: object
  handler.networkSettingsRequest:
    properties:
      enabled:
        type: boolean
      host:
        type: string
      ipStack:
        type: string
      password:
        type: string
      port:
        type: integer
      type:
        type: string
      username:
        type: string
    type: object
  handler.networkSettingsResponse:
    properties:
      enabled:
        type: boolean
      host:
        type: string
      ipStack:
        type: string
      password:
        type: string
      port:
        type: integer
      type:
        type: string
      username:
        type: string
    type: object
  handler.networkTestRequest:
    properties:
      enabled:
        type: boolean
      host:
        type: string
      password:
        type: string
      port:
        type: integer
      type:
        type: string
      username:
        type: string
    type: object
  handler.networkTestResponse:
    properties:
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  handler.readableContentResponse:
    properties:
      readableContent:
        type: string
    type: object
  handler.refreshStatusResponse:
    properties:
      isRefreshing:
        type: boolean
      lastRefreshedAt:
        type: string
    type: object
  handler.registerRequest:
    properties:
      email:
        type: string
      nickname:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handler.starredCountResponse:
    properties:
      count:
        type: integer
    type: object
  handler.summarizeRequest:
    properties:
      content:
        type: string
      entryId:
        type: string
      isReadability:
        type: boolean
      title:
        type: string
    type: object
  handler.summarizeResponse:
    properties:
      cached:
        type: boolean
      summary:
        type: string
    type: object
  handler.translateRequest:
    properties:
      content:
        type: string
      entryId:
        type: string
      isReadability:
        type: boolean
      title:
        type: string
    type: object
  handler.translateResponse:
    properties:
      cached:
        type: boolean
      content:
        type: string
    type: object
  handler.unreadCountsResponse:
    properties:
      counts:
        additionalProperties:
          type: integer
        type: object
    type: object
  handler.updateFeedRequest:
    properties:
      folderId:
        type: string
      summaryPromptReminder:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  handler.updateFolderTypeRequest:
    properties:
      type:
        type: string
    type: object
  handler.updateProfileRequest:
    properties:
      currentPassword:
        type: string
      email:
        type: string
      newPassword:
        type: string
      nickname:
        type: string
    type: object
  handler.updateProfileResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/handler.userResponse'
    type: object
  handler.updateReadRequest:
    properties:
      read:
        type: boolean
    type: object
  handler.updateStarredRequest:
    properties:
      starred:
        type: boolean
    type: object
  handler.updateTypeRequest:
    properties:
      type:
        type: string
    type: object
  handler.userResponse:
    properties:
      avatarUrl:
        type: string
      email:
        type: string
      nickname:
        type: string
      username:
        type: string
    type: object
  service.BatchTranslateResult:
    properties:
      cached:
        type: boolean
      id:
        type: string
      summary:
        type: string
      title:
        type: string
    type: object
  service.ImportResult:
    properties:
      feedsCreated:
        type: integer
      feedsSkipped:
        type: integer
      foldersCreated:
        type: integer
      foldersSkipped:
        type: integer
    type: object
  service.ImportTask:
    properties:
      createdAt:
        type: string
      current:
        type: integer
      error:
        type: string
      feed:
        type: string
      id:
        type: string
      result:
        $ref: '#/definitions/service.ImportResult'
      status:
        description: '"running", "done", "error", "cancelled"'
        type: string
      total:
        type: integer
    type: object
info:
  contact: {}
  description: This is a modern RSS reader API.
  title: Gist API
  version: "1.0"
paths:
  /ai/cache:
    delete:
      description: Delete all AI-generated summaries and translations cache.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.clearCacheResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Clear AI cache
      tags:
      - ai
  /ai/summarize:
    post:
      consumes:
      - application/json
      description: Generate an AI summary of the article content. Returns cached result
        if available, otherwise streams the response.
      parameters:
      - description: Summarize request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.summarizeRequest'
      produces:
      - application/json
      - text/event-stream
      responses:
        "200":
          description: Cached summary
          schema:
            $ref: '#/definitions/handler.summarizeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Generate AI summary
      tags:
      - ai
  /ai/translate:
    post:
      consumes:
      - application/json
      description: Translate article content. Returns cached result if available,
        otherwise streams block translations via SSE.
      parameters:
      - description: Translate request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.translateRequest'
      produces:
      - application/json
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.translateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Generate AI translation
      tags:
      - ai
  /ai/translate/batch:
    post:
      consumes:
      - application/json
      description: Translate multiple articles' titles and summaries. Returns NDJSON
        stream.
      parameters:
      - description: Batch translate request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.batchTranslateRequest'
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.BatchTranslateResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Batch translate articles
      tags:
      - ai
  /api/domain-rate-limits:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.domainRateLimitListResponse'
      summary: List all domain rate limits
      tags:
      - domain-rate-limits
    post:
      consumes:
      - application/json
      parameters:
      - description: Domain rate limit
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.domainRateLimitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.domainRateLimitResponse'
      summary: Create a domain rate limit
      tags:
      - domain-rate-limits
  /api/domain-rate-limits/{host}:
    delete:
      parameters:
      - description: Host
        in: path
        name: host
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Delete a domain rate limit
      tags:
      - domain-rate-limits
    put:
      consumes:
      - application/json
      parameters:
      - description: Host
        in: path
        name: host
        required: true
        type: string
      - description: Domain rate limit
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.domainRateLimitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.domainRateLimitResponse'
      summary: Update a domain rate limit
      tags:
      - domain-rate-limits
  /api/proxy/image/{encoded}:
    get:
      description: Proxies external images to avoid triggering anti-crawling mechanisms
      parameters:
      - description: Base64 URL-safe encoded image URL
        in: path
        name: encoded
        required: true
        type: string
      - description: Base64 URL-safe encoded article URL (used as Referer for CDN
          anti-hotlinking)
        in: query
        name: ref
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "504":
          description: Gateway Timeout
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Proxy external image
      tags:
      - proxy
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with username or email and get a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Clear authentication cookie and log out the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Get the currently authenticated user's info
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.userResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/profile:
    put:
      consumes:
      - application/json
      description: Update user nickname, email and/or password. Returns new token
        when password is changed.
      parameters:
      - description: Profile update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.updateProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Update profile
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user (only if none exists)
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Register user
      tags:
      - auth
  /auth/status:
    get:
      description: Check if a user has been registered
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.authStatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Check user status
      tags:
      - auth
  /entries:
    get:
      description: Get a list of entries with optional filters and pagination
      parameters:
      - description: Filter by feed ID
        in: query
        name: feedId
        type: integer
      - description: Filter by folder ID
        in: query
        name: folderId
        type: integer
      - description: Filter by content type (article, picture, notification)
        in: query
        name: contentType
        type: string
      - description: Only return unread entries
        in: query
        name: unreadOnly
        type: boolean
      - description: Only return starred entries
        in: query
        name: starredOnly
        type: boolean
      - description: Limit the number of entries (default 50)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.entryListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: List entries
      tags:
      - entries
  /entries/{id}:
    get:
      description: Get a single entry by its ID
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.entryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Get entry
      tags:
      - entries
  /entries/{id}/fetch-readable:
    post:
      description: Extract readable content from the entry's original URL using readability
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.readableContentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Fetch readable content
      tags:
      - entries
  /entries/{id}/read:
    patch:
      consumes:
      - application/json
      description: Mark an entry as read or unread
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: Read status
        in: body
        name: read
        required: true
        schema:
          $ref: '#/definitions/handler.updateReadRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Update read status
      tags:
      - entries
  /entries/{id}/starred:
    patch:
      consumes:
      - application/json
      description: Mark an entry as starred or unstarred
      parameters:
      - description: Entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: Starred status
        in: body
        name: starred
        required: true
        schema:
          $ref: '#/definitions/handler.updateStarredRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Update starred status
      tags:
      - entries
  /entries/cache:
    delete:
      description: Delete all unstarred entries (preserves starred entries). Also
        resets all feeds' ETag/Last-Modified to force full refresh on next update.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.entryClearResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Clear entry cache
      tags:
      - entries
  /entries/mark-read:
    post:
      consumes:
      - application/json
      description: Mark all entries as read, optionally filtered by feed, folder,
        or content type
      parameters:
      - description: Filter criteria
        in: body
        name: request
        required: true
